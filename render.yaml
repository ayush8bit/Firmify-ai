services:
  - type: web
    name: firmify-ai-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: CORS_ORIGINS
        value: https://firmify-ai.vercel.app,http://localhost:5173,http://127.0.0.1:5173
